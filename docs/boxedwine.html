<!doctype html>
<html lang="en-us">
  <head>
    <script src="coi-serviceworker.js"></script>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>BoxedWine</title>
    <meta name="description" content="boxedwine emulator">
    <meta name="keywords" content="emulator,wine,windows,x86,PC,emscripten,web assembly,wasm,boxedwine">
    <meta name="author" content="James Bryant, Kevin O'Dwyer">
      <link rel="stylesheet" type="text/css" href="boxedwine.css">
    <style>
      #bootOverlay{position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:18px;
        font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#e9edf3;
        background:radial-gradient(1000px 600px at 50% 0%,#22314a 0%,#0b0f16 55%,#070a10 100%);
        transition:opacity .6s ease}
      #bootOverlay.hide{opacity:0;pointer-events:none}
      #bootOverlay .bt{font-weight:900;font-size:clamp(22px,4vw,34px);letter-spacing:.02em;
        background:linear-gradient(180deg,#fff,#ffe08a 50%,#ff8a3c);-webkit-background-clip:text;
        background-clip:text;color:transparent}
      #bootOverlay .ball{width:34px;height:34px;border-radius:50%;
        background:radial-gradient(circle at 32% 30%,#fff,#cfd6df 35%,#7c8794 70%,#454c56);
        box-shadow:0 2px 8px rgba(0,0,0,.5);animation:bob 1.1s ease-in-out infinite}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
      #bootOverlay .track{width:min(420px,80vw);height:16px;border-radius:999px;overflow:hidden;
        background:#0b1017;border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 2px 6px rgba(0,0,0,.6);position:relative}
      #bootOverlay .bar{height:100%;width:0%;border-radius:999px;
        background:linear-gradient(90deg,#ffe27a,#ffb02e 55%,#ff7a1c);box-shadow:0 0 14px rgba(255,150,40,.5);
        transition:width .3s ease}
      #bootOverlay .track.indet .bar{width:35%!important;animation:slide 1.2s ease-in-out infinite}
      @keyframes slide{0%{margin-left:-35%}100%{margin-left:100%}}
      #bootOverlay .stage{font-weight:700;color:#ffd471;font-size:16px}
      #bootOverlay .time{font-variant-numeric:tabular-nums;color:#9fb0c2;font-size:14px}
      #bootOverlay .note{color:#6f8093;font-size:12px;max-width:420px;text-align:center;padding:0 16px}
      #bootOverlay .chd{margin-top:20px;color:#ffd471;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
      #bootOverlay .ctrls{margin-top:12px;display:grid;grid-template-columns:auto auto;gap:9px 26px;color:#c3d0de;font-size:14px}
      #bootOverlay .ctrls .row{display:flex;align-items:center;gap:9px}
      #bootOverlay .ctrls .k{color:#0c1017;background:linear-gradient(180deg,#f4f6fa,#c8cfd8);
        border-radius:6px;padding:3px 8px;font-weight:700;font-size:12px;box-shadow:0 2px 0 #7c8794;
        min-width:24px;text-align:center;display:inline-block}
      #loading{display:none!important}

      /* Раскладка: игра слева на всю высоту, интерфейс — в правой панели */
      html,body{margin:0;height:100%;background:#0b0f16;overflow:hidden}
      #app{display:flex;height:100vh;width:100vw;overflow:hidden;background:#0b0f16}
      #stage{flex:1 1 auto;min-width:0;display:flex;align-items:center;justify-content:center;
        padding:6px;background:#05070b}
      #stage #dropzone{border:0!important;margin:0;padding:0;max-width:100%;max-height:100%;
        display:flex;align-items:center;justify-content:center}
      #stage .emscripten_border{border:0!important;margin:0;padding:0;background:transparent;
        display:flex;align-items:center;justify-content:center}
      #stage canvas{display:block;background:#000;box-shadow:0 0 40px rgba(0,0,0,.55)}
      #side{flex:0 0 296px;width:296px;display:flex;flex-direction:column;gap:12px;
        padding:14px;background:#0d1219;border-left:1px solid rgba(255,255,255,.08);
        color:#c3d0de;font-family:"Segoe UI",system-ui,Arial,sans-serif;overflow:hidden}
      #sideTitle{font-weight:800;color:#ffd471;font-size:15px;letter-spacing:.02em}
      #controlsBar{display:flex;flex-direction:column;gap:9px;font-size:13px;color:#c3d0de;line-height:1.4}
      #controlsBar label,#controlsBar input[type=checkbox]{cursor:pointer;vertical-align:middle}
      #controlsBar input[type=button]{align-self:flex-start;margin-top:4px;padding:7px 14px;border-radius:8px;
        border:none;background:linear-gradient(180deg,#ffe27a,#ffb02e);color:#12203a;font-weight:700;cursor:pointer}
      #sideHint{color:#7d8da0;font-size:12px;line-height:1.5}
      #consoleWrap{flex:1 1 auto;min-height:0;display:flex}
      #consoleWrap #output{flex:1;width:100%;height:100%;resize:none;box-sizing:border-box;
        background:#05070b;color:#7fe0a0;border:1px solid rgba(255,255,255,.08);border-radius:6px;
        padding:6px;font-family:ui-monospace,Consolas,monospace;font-size:11px;line-height:1.35}
      @media (max-width:820px){
        #app{flex-direction:column}
        #side{flex:0 0 auto;width:auto;border-left:0;border-top:1px solid rgba(255,255,255,.08)}
        #stage{min-height:60vh}
      }
    </style>
    <script>
    (function(){
      // Информативный экран загрузки: прогресс привязан к РЕАЛЬНЫМ вехам из лога эмулятора.
      var t0 = Date.now();
      // Вехи (подстрока в логе -> целевой %). Появляются по мере загрузки Wine/игры.
      var ANCHORS = [
        { s:'Using root directory', pct:10 },
        { s:'Loaded boxedwine.zip',  pct:18 },
        { s:'Mounted ',              pct:26 },
        { s:'Launching ',            pct:34 },
        { s:'winpin.exe',            pct:52 },
        { s:'Showing Window',        pct:86 },
        { s:'openAudio',             pct:95 }
      ];
      var cur = 0, curAt = Date.now(), phase='download', done=false;
      var status = '';

      function mark(text){
        if(!text) return;
        for(var i=0;i<ANCHORS.length;i++){
          if(ANCHORS[i].pct>cur && text.indexOf(ANCHORS[i].s)>=0){ cur=ANCHORS[i].pct; curAt=Date.now(); phase='boot'; }
        }
        if(text.indexOf('Showing Window')>=0){ setTimeout(function(){ done=true; }, 500); }
      }
      var _log = console.log;
      console.log = function(){ try{ mark(Array.prototype.slice.call(arguments).join(' ')); }catch(e){} return _log.apply(console, arguments); };

      // Статус загрузки файлов (Downloading/Preparing) — до старта Wine
      var si = setInterval(function(){
        if(window.Module && Module.setStatus && !Module.setStatus.__wrapped){
          var _s = Module.setStatus;
          Module.setStatus = function(txt){ status=txt||''; return _s.apply(Module, arguments); };
          Module.setStatus.__wrapped = true; clearInterval(si);
        }
      }, 100);

      function nextPct(){ for(var i=0;i<ANCHORS.length;i++){ if(ANCHORS[i].pct>cur) return ANCHORS[i].pct; } return 99; }
      function stageLabel(){
        if(cur<10) return 'Загрузка файлов движка…';
        if(cur<26) return 'Подготовка файловой системы…';
        if(cur<52) return 'Запуск Windows-среды…';
        if(cur<86) return 'Загрузка игры…';
        return 'Почти готово…';
      }
      function fmt(s){ s=Math.max(0,Math.round(s)); return s+' с'; }

      document.addEventListener('DOMContentLoaded', function(){
        var ov = document.createElement('div');
        ov.id='bootOverlay';
        ov.innerHTML =
          '<div class="ball"></div>'+
          '<div class="bt">Soccer Pinball ’98</div>'+
          '<div class="track" id="boTrack"><div class="bar" id="boBar"></div></div>'+
          '<div class="stage" id="boStage">Подготовка…</div>'+
          '<div class="time" id="boTime"></div>'+
          '<div class="chd">Управление</div>'+
          '<div class="ctrls">'+
            '<div class="row"><span class="k">Z</span>левый флиппер</div>'+
            '<div class="row"><span class="k">R&nbsp;Shift</span>правый флиппер</div>'+
            '<div class="row"><span class="k">Enter</span>запуск мяча</div>'+
            '<div class="row"><span class="k">Space</span>толчок вверх</div>'+
            '<div class="row"><span class="k">X</span>толчок вправо</div>'+
            '<div class="row"><span class="k">/</span>толчок влево</div>'+
          '</div>'+
          '<div class="note" id="boNote">Первый запуск дольше — в браузере поднимается Windows-среда. Дальше игра идёт из памяти.</div>';
        document.body.appendChild(ov);
        var track=document.getElementById('boTrack'), bar=document.getElementById('boBar'),
            stage=document.getElementById('boStage'), time=document.getElementById('boTime');
        var shown = 0;

        var iv = setInterval(function(){
          var elapsed=(Date.now()-t0)/1000;
          if(done){
            track.classList.remove('indet'); bar.style.width='100%';
            stage.textContent='Готово!'; time.textContent='';
            clearInterval(iv);
            ov.classList.add('hide');
            setTimeout(function(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }, 700);
            return;
          }
          if(phase==='download' && cur===0){
            // фаза скачивания/подготовки файлов (реального % байт нет — показываем занятость + время)
            track.classList.add('indet');
            stage.textContent = (status.toLowerCase().indexOf('prepar')>=0) ? 'Подготовка файлов…' : 'Загрузка файлов движка…';
            time.textContent = 'прошло '+fmt(elapsed);
            return;
          }
          // фаза запуска: прогресс между реальными вехами с плавным приближением
          track.classList.remove('indet');
          var np=nextPct(), since=(Date.now()-curAt)/1000;
          var creep = cur + (np-1-cur)*(1-Math.exp(-since/9)); // тянемся к следующей вехе, не перепрыгивая
          shown = Math.max(shown, creep);                       // монотонно
          bar.style.width = shown.toFixed(1)+'%';
          stage.textContent = stageLabel();
          // оценка остатка из фактического прогресса
          var left = shown>6 ? elapsed*(100-shown)/shown : 0;
          time.textContent = (shown<93 && left>2) ? ('осталось ≈'+fmt(Math.min(left,180))) : 'почти готово…';
        }, 250);
      });

      // Масштабируем canvas игры под доступную область слева (пропорции сохраняются;
      // масштаб равномерный, поэтому эмулятор мапит мышь корректно). Интервал ловит смену
      // разрешения игрой (canvas.width/height меняются).
      function fitCanvas(){
        if(document.fullscreenElement) return;
        var stage=document.getElementById('stage'), c=document.getElementById('canvas');
        if(!stage||!c||!c.width||!c.height) return;
        var scale=Math.min(stage.clientWidth/c.width, stage.clientHeight/c.height);
        if(scale>0 && isFinite(scale)){ c.style.width=Math.round(c.width*scale)+'px'; c.style.height=Math.round(c.height*scale)+'px'; }
      }
      window.addEventListener('resize', fitCanvas);
      setInterval(fitCanvas, 400);
    })();
    </script>
  </head>
  <body>
  <div id="loading">
      <figure id="spinner" style="overflow: visible;">
         <div class="spinner" style="margin-top: .5em; margin-left: auto; margin-right: auto;"></div>
	  </figure>
      <div class="emscripten" id="status">Downloading...</div>
      <div class="emscripten">
          <progress value="0" max="100" id="progress"></progress>
      </div>
  </div>
    <div>
      <div id="app">
        <div id="stage">
            <div id="dropzone">
                <div class="emscripten_border">
                    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
                </div>
            </div>
        </div>
        <aside id="side">
            <div id="sideTitle">⚽ Soccer Pinball ’98</div>
            <div class="emscripten" id="controlsBar">
                <button id="startbtn" style="display: none" onclick="start()">Start</button>
                <button id="uploadbtn" style="display: none" onclick="document.getElementById('upload').click()" >Add File(s)</button>
                <input style="display: none" id="upload" name="upload" onclick="document.getElementById('uploadbtn').click();" onchange="startWithFiles(event.target.files);"  type="file" multiple />
                <button id="downloadbtn" style="display: none" onclick="buildGetFilesModal();">Get File(s)</button>
                <a style="display: none" id="modalLink" href="#openModal">Open</a>
                <a style="display: none" id="modalLinkExe" href="#openModalExe">Open</a>
                <span id="sound-checkbox" style="display: none">
                    <input type="checkbox" id="soundToggle" onclick="toggleSound();" />Enable Sound
                </span>
                <label><input type="checkbox" id="pointerLock" checked> Захват мыши</label>
                <label><input type="checkbox" id="showConsole" onclick="toggleConsole();"> Показать консоль</label>
                <input type="checkbox" id="resize" style="display:none">
                <input type="button" value="На весь экран" onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked, document.getElementById('resize').checked)">
                <div id="sideHint">Флипперы: <b>Z</b> / <b>R&nbsp;Shift</b><br>Запуск мяча: <b>Enter</b><br>Толчки: <b>Space</b> вверх · <b>X</b> вправо · <b>/</b> влево</div>
            </div>
            <div id="consoleWrap">
                <textarea class="emscripten" id="output" rows="8" style="display: none"></textarea>
            </div>
        </aside>
      </div>
        <div id="openModal" class="modalDialog">
            <div> <a href="#close" title="Close" class="close" onclick="closeGetFilesModal();">X</a>
                <div>
                    <h3>Get File(s)</h3>
                    <input id="selectedItem" type="text" size="50" readonly>
                    <button onclick="extract();">Get</button>
                </div>
                <div id="tree" class="scroll-style">
                </div>
                <div>
                    <h3 id="loadStatus">Loading...</h3>
                </div>
            </div>
        </div>
        <div id="openModalExe" class="modalDialog">
            <div> <a id="openModalExeClick" href="#close" title="Close" class="close">X</a>
                <div>
                    <h3>Execute</h3>
                    <div id="message"></div>
                    <div id="items" class="scroll-style"></div>
                </div>
            </div>
        </div>
        <hr>
    </div>
        <script src="boxedwine-shell.js"></script>
<script async type="text/javascript" src="boxedwine.js"></script>
  </body>
</html>
